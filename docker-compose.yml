services:
  api:
    build: .
    command: sh -c "pnpm db:push && pnpm --filter @webhook-flow/api start"
    environment:
      DATABASE_URL: file:../data/dev.db
      API_PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  mock-receiver:
    build: .
    command: sh -c "pnpm db:push && pnpm --filter @webhook-flow/mock-receiver start"
    environment:
      DATABASE_URL: file:../data/dev.db
      MOCK_RECEIVER_PORT: 4001
    ports:
      - "4001:4001"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: .
      args:
        VITE_API_BASE_URL: http://localhost:4000
        VITE_MOCK_BASE_URL: http://localhost:4001
        VITE_WORKFLOW_MOCK_BASE_URL: http://mock-receiver:4001
    command: sh -c "cd apps/web && pnpm exec vite preview --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:4000
      VITE_MOCK_BASE_URL: http://localhost:4001
      VITE_WORKFLOW_MOCK_BASE_URL: http://mock-receiver:4001
    ports:
      - "5173:5173"
    depends_on:
      - api
      - mock-receiver
